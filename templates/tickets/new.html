{% extends "base.html" %}
{% block title %}開立新當票{% endblock %}
{% block page_title %}開立新當票{% endblock %}

{% block content %}
<div class="row g-4">
  <div class="col-lg-7">
    <form method="post" id="ticketForm">

      <!-- 客戶資料 -->
      <div class="card p-4 mb-3">
        <div class="section-title"><i class="bi bi-person me-1"></i>客戶資料</div>
        <div class="row g-3">
          <div class="col-sm-4">
            <label class="form-label">姓名 <span class="text-red">*</span></label>
            <input type="text" name="customer_name" class="form-control" placeholder="姓名" required>
          </div>
          <div class="col-sm-4">
            <label class="form-label">身分證號</label>
            <input type="text" name="customer_id_card" class="form-control" placeholder="身分證號">
          </div>
          <div class="col-sm-4">
            <label class="form-label">電話</label>
            <input type="text" name="customer_phone" class="form-control" placeholder="電話">
          </div>
          <div class="col-12">
            <label class="form-label">地址</label>
            <input type="text" name="customer_address" class="form-control" placeholder="地址">
          </div>
        </div>
      </div>

      <!-- 物品資料 -->
      <div class="card p-4 mb-3">
        <div class="section-title"><i class="bi bi-box-seam me-1"></i>典當物品</div>
        <div class="row g-3">
          <div class="col-sm-8">
            <label class="form-label">物品名稱 <span class="text-red">*</span></label>
            <input type="text" name="item_name" class="form-control" placeholder="例：18K金手鍊、iPhone 15 Pro…" required>
          </div>
          <div class="col-sm-4">
            <label class="form-label">分類</label>
            <select name="category_id" id="categorySelect" class="form-select">
              <option value="">— 請選擇 —</option>
              {% for cat in categories %}
              <option value="{{ cat.id }}" data-rate="{{ cat.default_rate }}">{{ cat.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">物品描述</label>
            <textarea name="item_description" class="form-control" rows="2"
                      placeholder="品牌、型號、成色、重量等…"></textarea>
          </div>
        </div>
      </div>

      <!-- 金額設定 -->
      <div class="card p-4 mb-3">
        <div class="section-title"><i class="bi bi-calculator me-1"></i>金額與利率</div>
        <div class="row g-3">
          <div class="col-sm-4">
            <label class="form-label">典當金額（元）<span class="text-red">*</span></label>
            <input type="number" name="principal" id="principal" class="form-control"
                   placeholder="0" min="1" required>
          </div>
          <div class="col-sm-3">
            <label class="form-label">月利率（%）<span class="text-red">*</span></label>
            <input type="number" name="monthly_rate" id="monthlyRate" class="form-control"
                   placeholder="{{ settings.default_rate }}"
                   value="{{ settings.default_rate }}" step="0.1" min="0.1" required>
          </div>
          <div class="col-sm-2">
            <label class="form-label">典當期數（月）</label>
            <select name="term_months" id="termMonths" class="form-select">
              <option value="1">1 個月</option>
              <option value="2">2 個月</option>
              <option value="3" selected>3 個月</option>
              <option value="4">4 個月</option>
              <option value="6">6 個月</option>
              <option value="12">12 個月</option>
            </select>
          </div>
          <div class="col-sm-3">
            <label class="form-label">典當日期</label>
            <input type="date" name="pawn_date" id="pawnDate" class="form-control"
                   value="{{ today }}" required>
          </div>
        </div>
      </div>

      <!-- 業務員 -->
      {% if staff_list %}
      <div class="card p-4 mb-3">
        <div class="section-title"><i class="bi bi-person-badge me-1"></i>負責業務員</div>
        <select name="staff_id" class="form-select">
          <option value="">— 不指定 —</option>
          {% for s in staff_list %}
          <option value="{{ s.id }}">{{ s.name }}{% if s.phone %}（{{ s.phone }}）{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <!-- 備註 -->
      <div class="card p-4 mb-4">
        <label class="form-label section-title"><i class="bi bi-pencil me-1"></i>備註</label>
        <textarea name="notes" class="form-control" rows="2" placeholder="其他備注…"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-lg me-1"></i>開立當票
        </button>
        <a href="{{ url_for('tickets') }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>

  <!-- Preview -->
  <div class="col-lg-5">
    <div class="section-title"><i class="bi bi-eye me-1"></i>即時預覽</div>
    <div class="card p-4">
      <div class="calc-result">
        <div class="calc-row">
          <span class="text-muted">典當金額</span>
          <span id="prevPrincipal">—</span>
        </div>
        <div class="calc-row">
          <span class="text-muted">月利率</span>
          <span id="prevRate">—</span>
        </div>
        <div class="calc-row">
          <span class="text-muted">期數</span>
          <span id="prevMonths">—</span>
        </div>
        <div class="calc-row">
          <span class="text-muted">預期利息</span>
          <span id="prevInterest" class="text-amber">—</span>
        </div>
        <div class="calc-row total">
          <span>到期應收合計</span>
          <span id="prevTotal">—</span>
        </div>
      </div>
      <div class="mt-3 d-flex justify-content-between" style="font-size:.83rem; color:var(--text-muted)">
        <span>典當日：<span id="prevPawnDate">—</span></span>
        <span>到期日：<span id="prevDueDate" class="text-amber">—</span></span>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
const categorySelect = document.getElementById('categorySelect');
const monthlyRateInput = document.getElementById('monthlyRate');

categorySelect.addEventListener('change', () => {
  const rate = categorySelect.selectedOptions[0]?.dataset.rate;
  if (rate) monthlyRateInput.value = rate;
  updatePreview();
});

function addMonths(dateStr, months) {
  const d = new Date(dateStr);
  d.setMonth(d.getMonth() + months);
  return d.toISOString().split('T')[0];
}

function fmt(n) {
  return Number(n).toLocaleString('zh-TW', {maximumFractionDigits: 0});
}

function updatePreview() {
  const p = parseFloat(document.getElementById('principal').value) || 0;
  const r = parseFloat(monthlyRateInput.value) || 0;
  const m = parseInt(document.getElementById('termMonths').value) || 3;
  const d = document.getElementById('pawnDate').value;

  document.getElementById('prevPrincipal').textContent = p ? fmt(p) + ' 元' : '—';
  document.getElementById('prevRate').textContent = r ? r + ' %' : '—';
  document.getElementById('prevMonths').textContent = m + ' 個月';
  document.getElementById('prevPawnDate').textContent = d || '—';

  if (p && r && d) {
    const interest = Math.round(p * (r / 100) * m);
    const total = p + interest;
    const due = addMonths(d, m);
    document.getElementById('prevInterest').textContent = fmt(interest) + ' 元';
    document.getElementById('prevTotal').textContent = fmt(total) + ' 元';
    document.getElementById('prevDueDate').textContent = due;
  } else {
    document.getElementById('prevInterest').textContent = '—';
    document.getElementById('prevTotal').textContent = '—';
    document.getElementById('prevDueDate').textContent = '—';
  }
}

['principal','monthlyRate','termMonths','pawnDate'].forEach(id => {
  document.getElementById(id).addEventListener('input', updatePreview);
  document.getElementById(id).addEventListener('change', updatePreview);
});

updatePreview();
</script>
{% endblock %}
