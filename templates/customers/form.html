{% extends "base.html" %}
{% block title %}{% if action=='new' %}新增客戶{% else %}編輯客戶{% endif %}{% endblock %}
{% block page_title %}{% if action=='new' %}新增客戶{% else %}編輯客戶{% endif %}{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('customers') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>返回
  </a>
{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-6">
    <div class="card p-4">
      <form method="post">
        <div class="mb-3">
          <label class="form-label">姓名 <span class="text-red">*</span></label>
          <input type="text" name="name" class="form-control" required
                 value="{{ customer.name if customer else '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label">電話</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ customer.phone if customer else '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label">身分證號</label>
          <input type="text" name="id_card" class="form-control"
                 value="{{ customer.id_card if customer else '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label">地址</label>
          <input type="text" name="address" class="form-control"
                 value="{{ customer.address if customer else '' }}">
        </div>
        <div class="mb-4">
          <label class="form-label">備註</label>
          <textarea name="notes" class="form-control" rows="3">{{ customer.notes if customer else '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-lg me-1"></i>儲存
          </button>
          <a href="{{ url_for('customers') }}" class="btn btn-outline-secondary">取消</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
