<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>初始設定 — 當鋪管理系統</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .setup-card {
      width: 100%; max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      position: relative; z-index: 10;
    }
    .setup-logo { font-size: 2.5rem; color: var(--accent, #22d3ee); margin-bottom: .5rem; }
    .setup-title { font-size: 1.4rem; font-weight: 700; margin-bottom: .25rem; }
    .setup-sub { font-size: .85rem; color: var(--text-muted); margin-bottom: 2rem; }
    .notice-box {
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.3);
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .83rem;
      color: #93c5fd;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<div class="amb-blobs" aria-hidden="true">
  <div class="amb-blob b-blue"></div>
  <div class="amb-blob b-cyan"></div>
  <div class="amb-blob b-amber"></div>
  <div class="amb-blob b-purple"></div>
</div>

<canvas id="bg-canvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:.6"></canvas>

<div class="setup-card">
  <div class="text-center">
    <div class="setup-logo"><i class="bi bi-gem"></i></div>
    <div class="setup-title">初次設定</div>
    <div class="setup-sub">當鋪管理系統</div>
  </div>

  <div class="notice-box">
    <i class="bi bi-info-circle me-1"></i>
    首次使用需建立老闆帳號，此帳號擁有完整系統權限。
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 mb-3" style="font-size:.88rem">
        <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="post" autocomplete="off">
    <div class="mb-3">
      <label class="form-label">老闆帳號</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person-fill-gear"></i></span>
        <input type="text" name="username" class="form-control" placeholder="設定登入帳號"
               autofocus required>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">密碼</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="password" class="form-control" placeholder="至少 4 個字元" required minlength="4">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">確認密碼</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="confirm_password" class="form-control" placeholder="再次輸入密碼" required minlength="4">
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100" id="submitBtn">
      <i class="bi bi-check-circle me-1"></i>建立老闆帳號
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
  const pw = document.querySelector('[name=password]').value;
  const cpw = document.querySelector('[name=confirm_password]').value;
  if (pw !== cpw) {
    e.preventDefault();
    alert('兩次密碼不一致，請重新輸入');
  }
});

(function () {
  const cv = document.getElementById('bg-canvas');
  const ctx = cv.getContext('2d');
  let W, H;
  function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const N = 50, LINK = 130;
  const pts = Array.from({length: N}, () => ({
    x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
    vx: (Math.random() - .5) * .5, vy: (Math.random() - .5) * .5, r: Math.random() * 1.4 + .6,
  }));
  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of pts) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
    }
    for (let i = 0; i < N; i++) for (let j = i+1; j < N; j++) {
      const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < LINK) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(59,130,246,${(1 - d/LINK)*.25})`;
        ctx.lineWidth = .8;
        ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
      }
    }
    for (const p of pts) {
      ctx.beginPath(); ctx.fillStyle = 'rgba(100,175,255,.55)';
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
